<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>채점 결과 확인</title>
    <style>
        /* 기본적인 스타일 설정 */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 0;
        }
        /* 제목 스타일 설정 */
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        /* 날짜 선택 입력 필드 스타일 설정 */
        #date-picker {
            display: block;
            margin: 0 auto 20px;
        }
        /* 확인 버튼 스타일 설정 */
        #confirm-button {
            display: block;
            margin: 0 auto 20px;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        /* 파일 및 이미지 목록 스타일 설정 */
        .file-list, .image-list {
            margin-top: 20px;
        }
        /* 이미지 목록의 이미지 스타일 설정 */
        .image-list img {
            display: inline-block;
            margin-right: 10px;
            width: 100px;
            height: 100px;
            object-fit: cover;
        }
        /* 다운로드 버튼 스타일 설정 */
        .download-btn {
            display: inline-block;
            margin: 10px 0;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<h1>채점 결과 확인</h1>
<input type="date" id="date-picker" name="date-picker">
<button id="confirm-button">확인</button>
<div class="file-list" id="file-list">
    <!-- 엑셀 파일 다운로드 버튼이 여기 표시됩니다 -->
</div>
<div class="image-list" id="image-list">
    <!-- 이미지 목록이 여기 표시됩니다 -->
</div>

<script>
    // 확인 버튼 클릭 이벤트 리스너를 추가합니다.
    document.getElementById('confirm-button').addEventListener('click', function() {
        // 선택한 날짜를 가져옵니다.
        const selectedDate = document.getElementById('date-picker').value;
        // 날짜가 선택되었는지 확인합니다.
        if (selectedDate) {
            // 날짜가 선택되었으면 파일과 이미지를 가져옵니다.
            fetchFilesAndImages(selectedDate);
        } else {
            // 날짜가 선택되지 않았으면 경고 메시지를 표시합니다.
            alert('날짜를 선택해주세요.');
        }
    });

    // 서버에서 파일과 이미지를 가져오는 함수입니다.
    function fetchFilesAndImages(date) {
        fetch('/api/files/by-date', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ date: date }) // 요청 본문에 선택한 날짜를 JSON 형식으로 전송합니다.
        })
            .then(response => response.json()) // 응답을 JSON으로 변환합니다.
            .then(data => {
                displayFiles(data.excelFiles); // 엑셀 파일을 표시합니다.
                displayImages(data.images);    // 이미지를 표시합니다.
            })
            .catch(error => console.error('Error:', error)); // 에러가 발생하면 콘솔에 에러를 출력합니다.
    }

    // 엑셀 파일을 표시하는 함수입니다.
    function displayFiles(files) {
        const fileListDiv = document.getElementById('file-list');
        fileListDiv.innerHTML = '<h2>엑셀 파일 다운로드:</h2>'; // 파일 목록의 제목을 설정합니다.
        files.forEach(file => {
            const downloadLink = document.createElement('a'); // 다운로드 링크 요소를 생성합니다.
            downloadLink.href = `./path/to/excel/files/${file.fileName}`; // 다운로드 링크의 URL을 설정합니다.
            downloadLink.download = file.fileName; // 다운로드 속성을 설정합니다.
            downloadLink.textContent = `Download ${file.fileName}`; // 링크 텍스트를 설정합니다.
            downloadLink.className = 'download-btn'; // 다운로드 버튼 스타일을 적용합니다.
            fileListDiv.appendChild(downloadLink); // 다운로드 링크를 파일 목록에 추가합니다.
        });
    }

    // 이미지를 표시하는 함수입니다.
    function displayImages(images) {
        const imageListDiv = document.getElementById('image-list');
        imageListDiv.innerHTML = '<h2>이미지 목록:</h2>'; // 이미지 목록의 제목을 설정합니다.
        images.forEach(image => {
            const imgElement = document.createElement('img'); // 이미지 요소를 생성합니다.
            imgElement.src = `./path/to/images/${image.imageName}`; // 이미지의 URL을 설정합니다.
            imgElement.alt = image.imageName; // 이미지의 대체 텍스트를 설정합니다.
            imageListDiv.appendChild(imgElement); // 이미지 요소를 이미지 목록에 추가합니다.
        });
    }
</script>
</body>
</html>
